{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-shop"></i> Vendor Login</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Vendor Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Vendor Login</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Want to sell tickets? <a href="{{ url_for('register_vendor') }}">Register as Vendor</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
