{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Event</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">Event Title</label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ event.title }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="4" required>{{ event.description }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="Music" {% if event.category == 'Music' %}selected{% endif %}>Music</option>
                                    <option value="Sports" {% if event.category == 'Sports' %}selected{% endif %}>Sports</option>
                                    <option value="Comedy" {% if event.category == 'Comedy' %}selected{% endif %}>Comedy</option>
                                    <option value="Theater" {% if event.category == 'Theater' %}selected{% endif %}>Theater</option>
                                    <option value="Conference" {% if event.category == 'Conference' %}selected{% endif %}>Conference</option>
                                    <option value="Festival" {% if event.category == 'Festival' %}selected{% endif %}>Festival</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="venue" class="form-label">Venue</label>
                                <input type="text" class="form-control" id="venue" name="venue" value="{{ event.venue }}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="ticket_price" class="form-label">Ticket Price (KES)</label>
                                <input type="number" class="form-control" id="ticket_price" name="ticket_price" min="0" step="0.01" value="{{ event.ticket_price }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="image_url" class="form-label">Image URL (Optional)</label>
                                <input type="url" class="form-control" id="image_url" name="image_url" value="{{ event.image_url or '' }}">
                            </div>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> Note: Ticket quantity and date cannot be edited after creation.
                        </div>
                        
                        <hr>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="bi bi-check-circle"></i> Update Event
                            </button>
                            <a href="{{ url_for('vendor_dashboard') }}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
